<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Movie Watchlist</title>
</head>
<body>
    <div class="image">
        <nav class="header">
            <h1><a href="index.html">Find your film</a></h1>
            <p><a href="watchlist.html">My Watchlist</a></p>
        </nav>
    </div>
    <div class="main-container">
        <div class="search">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="search" class="search-input" id="search-input" placeholder="Enter Movie Name">
            </div>
            <button class="search-btn" id="search-btn">Search</button>
        </div>
            <div class="empty-state">
                <div class="placeholder" id="placeholder"></div>
            </div>
            <div class="initial-search">
                <div id="movie-container" class="movie-container"></div>
            </div>
    </div>
        <script type="module" src="index.js"></script>
</body>
</html>
